name: Build

on:
  push:
    branches: [main, conversion-to-windows]
    tags: ['v*']
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64 (static)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libde265
            mingw-w64-ucrt-x86_64-libjpeg-turbo

      - name: Build static binary
        run: ./scripts/build_static.sh

      - name: Smoke test
        run: ./heic_converter_mt.exe --version

      - uses: actions/upload-artifact@v4
        with:
          name: heic_converter_mt-windows-x64
          path: heic_converter_mt.exe

  macos:
    name: macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel (x86_64) needs GitHub's retired macos-13 runner; if Intel
          # support is wanted later, cross-compile from the arm64 runner.
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja jpeg-turbo

      - name: Build static binary
        run: ./scripts/build_static.sh

      - name: Smoke test
        run: ./heic_converter_mt --version

      - uses: actions/upload-artifact@v4
        with:
          name: heic_converter_mt-macos-${{ matrix.arch }}
          path: heic_converter_mt

  release:
    name: Attach binaries to release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Package artifacts
        run: |
          (cd heic_converter_mt-windows-x64 && zip ../heic_converter_mt-windows-x64.zip heic_converter_mt.exe)
          for arch in arm64 x86_64; do
            if [ -d "heic_converter_mt-macos-$arch" ]; then
              chmod +x "heic_converter_mt-macos-$arch/heic_converter_mt"
              tar -czf "heic_converter_mt-macos-$arch.tar.gz" -C "heic_converter_mt-macos-$arch" heic_converter_mt
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            heic_converter_mt-windows-x64.zip
            heic_converter_mt-macos-*.tar.gz
