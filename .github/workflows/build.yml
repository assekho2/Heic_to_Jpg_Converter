name: Build

on:
  push:
    branches: [main, conversion-to-windows]
    tags: ['v*']
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64 (static)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libde265
            mingw-w64-ucrt-x86_64-libjpeg-turbo

      - name: Build static binary
        run: ./scripts/build_static.sh

      - name: Smoke test
        run: ./heic_converter_mt.exe --version

      - uses: actions/upload-artifact@v4
        with:
          name: heic_converter_mt-windows-x64
          path: heic_converter_mt.exe

      - name: Build GUI app
        run: |
          cmake -S . -B build/gui -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/gui

      - uses: actions/upload-artifact@v4
        with:
          name: heic_converter_gui-windows-x64
          path: build/gui/heic_converter_gui.exe

  macos:
    name: macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel (x86_64) needs GitHub's retired macos-13 runner; if Intel
          # support is wanted later, cross-compile from the arm64 runner.
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja jpeg-turbo

      - name: Build static binary
        run: ./scripts/build_static.sh

      - name: Smoke test
        run: ./heic_converter_mt --version

      - uses: actions/upload-artifact@v4
        with:
          name: heic_converter_mt-macos-${{ matrix.arch }}
          path: heic_converter_mt

      - name: Build GUI app
        run: |
          cmake -S . -B build/gui -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          cmake --build build/gui

      - uses: actions/upload-artifact@v4
        with:
          name: heic_converter_gui-macos-${{ matrix.arch }}
          path: build/gui/heic_converter_gui

  release:
    name: Attach binaries to release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4   # needed for the packaging/ templates and launchers

      - uses: actions/download-artifact@v4

      - name: Package artifacts
        run: |
          # Each archive contains a single "HEIC-to-JPG-Converter" folder
          # holding the binary, an empty "photos to convert" folder for the
          # user to drop photos into, a double-click launcher, and a readme.txt.
          folder="HEIC-to-JPG-Converter"

          # Windows
          win="heic_converter_mt-windows-x64"
          mkdir -p "$win/$folder/photos to convert"
          mv "$win/heic_converter_mt.exe" "$win/$folder/"
          cp packaging/Convert.bat "$win/$folder/"
          cp packaging/README-windows.txt "$win/$folder/readme.txt"
          (cd "$win" && zip -r "../$win.zip" "$folder")

          # macOS
          for arch in arm64 x86_64; do
            src="heic_converter_mt-macos-$arch"
            if [ -d "$src" ]; then
              mkdir -p "$src/$folder/photos to convert"
              chmod +x "$src/heic_converter_mt"
              mv "$src/heic_converter_mt" "$src/$folder/"
              cp packaging/Convert.command "$src/$folder/"
              chmod +x "$src/$folder/Convert.command"
              cp packaging/README-macos.txt "$src/$folder/readme.txt"
              tar -czf "$src.tar.gz" -C "$src" "$folder"
            fi
          done

          # --- GUI app: a single self-contained binary, packaged as-is ---
          if [ -d heic_converter_gui-windows-x64 ]; then
            (cd heic_converter_gui-windows-x64 && zip "../heic_converter_gui-windows-x64.zip" heic_converter_gui.exe)
          fi
          for arch in arm64 x86_64; do
            gsrc="heic_converter_gui-macos-$arch"
            if [ -d "$gsrc" ]; then
              chmod +x "$gsrc/heic_converter_gui"
              tar -czf "$gsrc.tar.gz" -C "$gsrc" heic_converter_gui
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            heic_converter_mt-windows-x64.zip
            heic_converter_mt-macos-*.tar.gz
            heic_converter_gui-windows-x64.zip
            heic_converter_gui-macos-*.tar.gz
